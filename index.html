<title>LC Kontakt — výloha</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;1,9..144,400&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   VÝLOHA — TV DISPLEJ   verze k / 2026-07-09
   Nabídka = DESTINACE + DATUM ODLETU + SEZNAM HOTELŮ.

   DVĚ TV, RŮZNÝ OBSAH, JEDEN GIST:
   - kanál A: např. České zájezdy a poznávačky
   - kanál B: např. Lasty a superlasty
   Kanál se vybere adresou:  ?channel=a   /   ?channel=b
   Bez parametru se zobrazí všechno.

   ORIENTACE (pozná se sama, dá se vynutit):
   - 55" na šířku  -> poutač vlevo, seznam vpravo
   - 32" na výšku  -> poutač nahoře, seznam dole   (?layout=portrait)

   Příklady:
     index.html?gist=<ID>&channel=a&layout=portrait
     index.html?gist=<ID>&channel=b
   ============================================================ */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0A5250;--bg2:#0C605D;--surface:#12736E;--surface2:#1A928A;
  --line:rgba(240,220,168,.30);--line-soft:rgba(243,238,227,.14);
  --gold:#E0BC7C;--gold-b:#F4E0AC;--cream:#F5F1E7;--muted:#BFE3DF;
  --shadow:0 24px 60px rgba(0,32,31,.45);--ink:#083836;
}
html,body{height:100%}
body{background:
  radial-gradient(1200px 700px at 82% -10%, rgba(224,188,124,.12), transparent 60%),
  radial-gradient(900px 600px at 8% 110%, rgba(26,146,138,.42), transparent 55%),
  var(--bg);
  color:var(--cream);font-family:"Manrope",system-ui,Arial,sans-serif;-webkit-font-smoothing:antialiased;overflow:hidden}
.stage{height:100vh;margin:0 auto;padding:20px 28px 58px;display:flex;flex-direction:column;max-width:2100px}
.head{display:flex;align-items:flex-end;justify-content:space-between;gap:24px;padding-bottom:12px;border-bottom:1px solid var(--line)}
.brand{display:flex;flex-direction:column;gap:4px}
.brand .eyebrow{font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--gold);font-weight:600}
.brand h1{font-family:"Fraunces",Georgia,serif;font-weight:400;font-size:34px;line-height:.98;color:var(--cream)}
.brand h1 em{font-style:italic;color:var(--gold-b)}
.brand .tag{font-size:13px;color:var(--muted)}
.clock{text-align:right;flex:none}
.clock .t{font-family:"Fraunces",serif;font-size:29px;font-weight:500;letter-spacing:1px;font-variant-numeric:tabular-nums}
.clock .d{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);margin-top:2px}

.body{flex:1;min-height:0;display:grid;gap:20px;padding-top:14px;
      grid-template-columns:minmax(0,1fr) minmax(0,.52fr)}

/* ---- HERO ---- */
.feat{position:relative;border-radius:24px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--shadow);background:var(--surface);min-height:0;display:flex;flex-direction:column}
.fbg{position:absolute;inset:0;background-size:cover;background-position:center;transform:scale(1.04);animation:fken 10s linear forwards}
@keyframes fken{from{transform:scale(1.04)}to{transform:scale(1.11)}}
.feat:after{content:"";position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(6,58,56,.30) 0%,rgba(6,58,56,.72) 34%,rgba(4,44,42,.97) 62%)}
.fin{position:relative;z-index:2;display:flex;flex-direction:column;height:100%;padding:30px 40px 32px}
.ftop{opacity:0;animation:rise .8s .1s both}
.feyebrow{font-size:13px;letter-spacing:.34em;text-transform:uppercase;color:var(--gold);font-weight:600}
.fname{font-family:"Fraunces",serif;font-weight:500;font-size:58px;line-height:.96;color:var(--cream);margin:8px 0 12px}
.fdep{display:inline-flex;align-items:center;gap:10px;font-size:16px;background:rgba(6,58,56,.5);border:1px solid var(--line);padding:7px 16px;border-radius:999px}
.fdep b{color:var(--gold-b);font-weight:600}
.ffrom{margin:16px 0 6px;font-family:"Fraunces",serif;color:var(--gold-b);font-size:20px;opacity:0;animation:rise .9s .25s both}
.ffrom b{font-size:46px;font-weight:500}
.fhot{flex:1;min-height:0;display:flex;flex-direction:column;margin-top:8px;opacity:0;animation:rise 1s .4s both;overflow:hidden}
.fhr{display:flex;align-items:center;gap:16px;padding:11px 2px;border-bottom:1px solid var(--line-soft)}
.fhr:last-child{border-bottom:none}
.fh-i{flex:1;min-width:0}
.fh-n{font-size:19px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fh-n .st{color:var(--gold);font-size:14px;margin-left:6px;letter-spacing:1px}
.fh-b{font-size:14px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fh-p{flex:none;text-align:right}
.fh-pa{font-family:"Fraunces",serif;font-size:23px;color:var(--gold-b);white-space:nowrap}
.fh-pc{display:block;font-size:12px;color:var(--muted);white-space:nowrap;margin-top:1px}
.fnote{margin-top:12px;font-size:11px;color:var(--muted);opacity:.75;line-height:1.4}
.flm{position:absolute;top:22px;right:210px;z-index:3;background:linear-gradient(180deg,var(--gold-b),var(--gold));color:var(--ink);font-size:11px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;padding:6px 13px;border-radius:999px}
.fqr{position:absolute;top:20px;right:22px;z-index:3;display:flex;align-items:center;gap:11px;background:rgba(6,58,56,.6);border:1px solid var(--line);border-radius:15px;padding:10px 13px}
.fqr .q{width:58px;height:58px;background:#fff;border-radius:9px;padding:5px;flex:none}
.fqr .q img{width:100%;height:100%;display:block}
.fqr .qt{font-size:12px;color:var(--muted);line-height:1.4;max-width:118px}
.fqr .qt b{color:var(--cream);display:block;margin-bottom:2px}
@keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fempty{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:40px;color:var(--muted);font-size:18px;z-index:2}

/* ---- SEZNAM ---- */
.lwrap{display:flex;flex-direction:column;min-height:0}
.lhd{display:flex;align-items:baseline;justify-content:space-between;gap:12px;margin-bottom:10px}
.lhd .l{font-size:12px;letter-spacing:.3em;text-transform:uppercase;color:var(--gold);font-weight:600}
.lhd .s{font-size:12px;color:var(--muted)}
.list{flex:1;min-height:0;display:flex;flex-direction:column;gap:7px;transition:opacity .45s}
.list.fade{opacity:0}
.lrow{display:flex;align-items:center;gap:13px;padding:9px 13px;border-radius:13px;border:1px solid var(--line-soft);background:var(--surface);flex:1 1 0;min-height:0;max-height:82px}
.lrow.hot{border-color:var(--gold)}
.ldate{flex:none;width:78px;text-align:center;background:linear-gradient(180deg,var(--gold-b),var(--gold));color:var(--ink);border-radius:11px;padding:7px 5px;line-height:1.05}
.ldate .dd{display:block;font-family:"Fraunces",serif;font-size:19px;font-weight:600}
.ldate .dy{display:block;font-size:10px;opacity:.72;margin-top:1px}
.ldate.alt{background:rgba(6,58,56,.5);color:var(--gold-b);border:1px solid var(--line);font-size:11px;padding:11px 5px;font-family:"Manrope",sans-serif}
.linfo{flex:1;min-width:0}
.lcountry{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lname{font-family:"Fraunces",serif;font-size:22px;line-height:1.04;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.llm{display:inline-block;margin-left:7px;font-size:9px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:linear-gradient(180deg,var(--gold-b),var(--gold));color:var(--ink);padding:2px 6px;border-radius:999px;vertical-align:middle}
.lhot{font-size:11px;color:var(--muted);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lprice{flex:none;text-align:right}
.lprice .pl{display:block;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
.lprice .pa{font-family:"Fraunces",serif;font-size:21px;color:var(--gold-b);white-space:nowrap}
.lprice .pc{display:block;font-size:11px;color:var(--muted);white-space:nowrap}
.lempty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:16px}
.pgbar{display:flex;align-items:center;justify-content:space-between;gap:16px;padding-top:9px}
.pgbar .pgi{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.pgdots{display:flex;gap:7px}
.pgdots .dot{width:8px;height:8px;border-radius:50%;background:rgba(243,238,227,.25);transition:.3s}
.pgdots .dot.on{background:var(--gold-b);transform:scale(1.15)}

/* ---- LIŠTA ---- */
.ticker{position:fixed;left:0;right:0;bottom:0;z-index:62;height:44px;overflow:hidden;background:linear-gradient(180deg,#0c605c,#083f3d);border-top:1px solid var(--line);box-shadow:0 -10px 30px rgba(0,26,25,.35);display:flex;align-items:center}
.ticker.hide{display:none}
.tk-track{display:inline-flex;align-items:center;white-space:nowrap;will-change:transform;animation:tkscroll linear infinite}
@keyframes tkscroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.tk-item{display:inline-flex;align-items:center;gap:8px;font-size:14px;padding:0 4px}
.tk-item b{color:var(--gold-b);font-weight:600}
.tk-child{color:var(--muted);font-size:12px}
.tk-hot{display:inline-flex;align-items:center;font-family:"Fraunces",serif;font-size:16px;color:var(--gold-b);padding:0 4px}
.tk-lm{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;background:linear-gradient(180deg,var(--gold-b),var(--gold));color:var(--ink);padding:3px 8px;border-radius:999px}
.tk-sep{color:var(--gold);opacity:.5;padding:0 18px;font-size:12px}
.stat{position:fixed;left:10px;bottom:54px;z-index:63;width:9px;height:9px;border-radius:50%;background:#7bd6c8;opacity:.45;transition:.3s}
.stat.off{background:#e6a15e;opacity:.85}

/* ============================================================
   PORTRÉT — 32" na výšku (poutač nahoře, seznam dole)
   Aktivní přes třídu .portrait na <html> (nastaví JS).
   ============================================================ */
html.portrait .stage{padding:26px 26px 62px;max-width:none}
html.portrait .head{flex-direction:row;align-items:flex-end}
html.portrait .brand h1{font-size:44px}
html.portrait .brand .eyebrow{font-size:14px}
html.portrait .brand .tag{font-size:15px}
html.portrait .clock .t{font-size:34px}
html.portrait .body{grid-template-columns:1fr;grid-template-rows:minmax(0,1.15fr) minmax(0,1fr);gap:20px}
html.portrait .feat{min-height:0}
html.portrait .fin{padding:34px 38px 32px}
html.portrait .fname{font-size:72px}
html.portrait .feyebrow{font-size:16px}
html.portrait .fdep{font-size:19px;padding:9px 19px}
html.portrait .ffrom{font-size:24px;margin:18px 0 6px}
html.portrait .ffrom b{font-size:58px}
html.portrait .fh-n{font-size:24px}
html.portrait .fh-b{font-size:17px}
html.portrait .fh-pa{font-size:28px}
html.portrait .fh-pc{font-size:15px}
html.portrait .fhr{padding:13px 2px}
html.portrait .fnote{font-size:13px}
html.portrait .fqr{top:24px;right:26px;padding:12px 16px}
html.portrait .fqr .q{width:76px;height:76px}
html.portrait .fqr .qt{font-size:14px;max-width:150px}
html.portrait .flm{right:auto;left:26px;top:24px}
html.portrait .lhd .l{font-size:14px}
html.portrait .lhd .s{font-size:14px}
html.portrait .list{gap:9px}
html.portrait .lrow{padding:12px 16px;gap:16px;max-height:none}
html.portrait .ldate{width:96px;padding:9px 6px}
html.portrait .ldate .dd{font-size:24px}
html.portrait .ldate .dy{font-size:12px}
html.portrait .lcountry{font-size:12px}
html.portrait .lname{font-size:28px}
html.portrait .lhot{font-size:14px}
html.portrait .lprice .pl{font-size:11px}
html.portrait .lprice .pa{font-size:26px}
html.portrait .lprice .pc{font-size:13px}
html.portrait .pgbar .pgi{font-size:13px}
html.portrait .ticker{height:52px}
html.portrait .tk-item{font-size:18px}
html.portrait .tk-hot{font-size:20px}
html.portrait .tk-child{font-size:15px}
html.portrait .stat{bottom:62px}

/* malé displeje / náhled v mobilu */
@media(max-width:900px){
  body{overflow:auto}
  .stage{height:auto;min-height:100vh;padding:18px 14px 56px}
  .head{flex-direction:column;align-items:flex-start;gap:12px}.clock{text-align:left}
  .brand h1,html.portrait .brand h1{font-size:28px}
  .body,html.portrait .body{grid-template-columns:1fr;grid-template-rows:none;gap:16px}
  .feat{min-height:70vh}
  .fname,html.portrait .fname{font-size:40px}
  .ffrom b,html.portrait .ffrom b{font-size:34px}
  html.portrait .fh-n{font-size:19px}html.portrait .fh-pa{font-size:22px}
  .lrow,html.portrait .lrow{flex:0 0 auto;max-height:none}
  html.portrait .lname{font-size:22px}
  .ticker,html.portrait .ticker{height:40px}
  .tk-item,html.portrait .tk-item{font-size:12px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.ftop,.ffrom,.fhot{opacity:1}}
</style>

function qparam(n){ var m=new RegExp("[?&]"+n+"=([^&]+)").exec(location.search); return m?decodeURIComponent(m[1]):""; }
function detectChannel(){ CHANNEL=qparam("channel").toLowerCase(); if(CHANNEL!=="a"&&CHANNEL!=="b"){ CHANNEL=""; } }
function detectLayout(){
  var f=qparam("layout").toLowerCase();
  if(f==="portrait"){ IS_PORTRAIT=true; }
  else if(f==="landscape"){ IS_PORTRAIT=false; }
  else { IS_PORTRAIT = window.innerHeight > window.innerWidth; }
  document.documentElement.className = IS_PORTRAIT ? "portrait" : "";
}

     {name:"Işıl Club",stars:4,board:"7 nocí all inclusive",priceAdult:13490,priceChild:6990}
   ]},
  {name:"Rhodos",country:"Řecko",depart:"2026-07-16",term:"",lastmin:true,channel:"b",top:false,img:"",
   hotels:[{name:"Sun Beach Resort",stars:4,board:"7 nocí all inclusive",priceAdult:15490,priceChild:7990}]},
  {name:"Hurghada",country:"Egypt",depart:"2026-07-21",term:"",lastmin:true,channel:"b",top:false,img:"",
   hotels:[{name:"Titanic Beach Spa",stars:5,board:"7 nocí all inclusive",priceAdult:12990,priceChild:6490}]}
];

var CONFIG=clone(DEFAULT_CONFIG), DATA=clone(DEFAULT_DATA);
var pages=[], activePage=0, heroItems=[], heroIndex=0, step=0, rotTimer=null, tickerEmpty=true;

function clone(x){ return JSON.parse(JSON.stringify(x)); }
function mergeConfig(src){ var o=clone(DEFAULT_CONFIG),k; if(src){ for(k in src){ if(src.hasOwnProperty(k)){ o[k]=src[k]; } } } return o; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function trimStr(s){ return String(s==null?"":s).replace(/^\s+|\s+$/g,""); }
function money(n){ var s=String(n),o="",c=0,i; for(i=s.length-1;i>=0;i--){ o=s.charAt(i)+o;c++; if(c%3===0&&i>0){o=" "+o;} } return o; }
function fmtDate(s){ var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(String(s)); if(!m){ return ""; } return parseInt(m[3],10)+". "+parseInt(m[2],10)+". "+m[1]; }
function starStr(n){ var s="",i; n=n?parseInt(n,10):0; for(i=0;i<n;i++){ s+="\u2605"; } return s; }
var GRADS=[
  "linear-gradient(150deg,#0d6b66,#17a79b 48%,#e0bc7c)","linear-gradient(150deg,#0f6f6a,#1fb8ad 52%,#f4e0ac)",
  "linear-gradient(150deg,#0c6460,#1a9a90 46%,#d8a15e)","linear-gradient(150deg,#12706a,#2ab3a5 50%,#e0bc7c)",
  "linear-gradient(150deg,#0d6560,#189c92 48%,#e0b878)","linear-gradient(150deg,#0e6a64,#1aa89c 46%,#caa267)"];
function bgFor(it,i){ if(it.img){ var u=String(it.img).replace(/'/g,"%27").replace(/"/g,"%22"); return "url('"+u+"')"; } return GRADS[i%GRADS.length]; }
function qrUrl(size){ return "https://api.qrserver.com/v1/create-qr-code/?size="+size+"x"+size+"&margin=0&color=083836&bgcolor=ffffff&data="+encodeURIComponent(CONFIG.pageUrl); }
function normItem(it){
  if(!it.hotels||it.hotels.length===undefined){ it.hotels=[]; }
  if(it.hotels.length===0&&(it.priceAdult||it.price)){
    it.hotels=[{name:it.name,stars:0,board:(it.dur?it.dur:""),priceAdult:it.priceAdult?it.priceAdult:it.price,priceChild:it.priceChild?it.priceChild:0}];
  }
  if(it.depart==null){ it.depart=""; }
  if(it.term==null){ it.term=""; }
  if(it.channel!=="a"&&it.channel!=="b"){ it.channel="a"; }
  return it;
}
function normalizeData(){ var i; for(i=0;i<DATA.length;i++){ normItem(DATA[i]); } }
/* nabídky jen pro tuhle TV */
function chanData(){
  if(!CHANNEL){ return DATA.slice(); }
  var out=[],i; for(i=0;i<DATA.length;i++){ if(DATA[i].channel===CHANNEL){ out.push(DATA[i]); } }
  return out;
}
function chanCfg(){
  var c=CONFIG.channels&&CONFIG.channels[CHANNEL];
  return c?c:null;
}
function fromPrice(it){ var min=0,i,p; for(i=0;i<it.hotels.length;i++){ p=it.hotels[i].priceAdult; if(p>0&&(min===0||p<min)){ min=p; } } return min; }
function minChild(it){ var min=0,i,p; for(i=0;i<it.hotels.length;i++){ p=it.hotels[i].priceChild; if(p>0&&(min===0||p<min)){ min=p; } } return min; }

function applyConfig(){
  var c=chanCfg();
  var title=(c&&trimStr(c.title))?c.title:CONFIG.agency;
  var tag=(c&&trimStr(c.tagline))?c.tagline:CONFIG.tagline;
  document.getElementById("bName").innerHTML=esc(title).replace("vás","<em>vás</em>");
  document.getElementById("bEyebrow").textContent=CONFIG.eyebrow;
  document.getElementById("bTag").textContent=tag;
  var lbl=(c&&trimStr(c.listLabel))?c.listLabel:"Další odlety";
  document.getElementById("lLabel").textContent=lbl;
}
function sortedTrips(){
  var arr=chanData();
  arr.sort(function(a,b){ var da=a.depart?String(a.depart):"", db=b.depart?String(b.depart):"";
    if(da===db){ return 0; } if(da===""){ return 1; } if(db===""){ return -1; } return da<db?-1:1; });
  return arr;
}

/* ---- HERO ---- */
function heroList(){ var src=chanData(),t=[],i; for(i=0;i<src.length;i++){ if(src[i].top){ t.push(src[i]); } } if(t.length===0){ t=sortedTrips().slice(0,6); } return t; }
function buildHero(){ heroItems=heroList(); if(heroIndex>=heroItems.length){ heroIndex=0; } }
function renderHero(){
  var host=document.getElementById("feat");
  if(heroItems.length===0){ host.innerHTML='<div class="fempty">Pro tuto obrazovku zatím nejsou nabídky.<br>Přiřaďte je v adminu ke kanálu.</div>'; return; }
  var it=heroItems[heroIndex];
  var dep=it.term?it.term:(it.depart?fmtDate(it.depart):"");
  var cap=heroHotelMax(), max=(it.hotels.length>cap?cap:it.hotels.length);
  var rows="",j,h;
  for(j=0;j<max;j++){ h=it.hotels[j];
    rows+='<div class="fhr"><div class="fh-i">'+
      '<div class="fh-n">'+esc(h.name)+(h.stars>0?'<span class="st">'+starStr(h.stars)+'</span>':'')+'</div>'+
      (h.board?'<div class="fh-b">'+esc(h.board)+'</div>':'')+
      '</div><div class="fh-p"><span class="fh-pa">'+money(h.priceAdult)+' Kč</span>'+
      (h.priceChild>0?'<span class="fh-pc">dítě od '+money(h.priceChild)+' Kč</span>':'')+
      '</div></div>'; }
  var from=fromPrice(it), qsize=IS_PORTRAIT?170:140;
  host.innerHTML=
    '<div class="fbg" style="background-image:'+bgFor(it,heroIndex)+'"></div>'+
    (it.lastmin?'<div class="flm">Last minute</div>':'')+
    '<div class="fqr"><div class="q"><img src="'+qrUrl(qsize)+'" alt="QR"></div>'+
      '<div class="qt"><b>Celá nabídka</b>'+esc(CONFIG.phone)+'</div></div>'+
    '<div class="fin">'+
      '<div class="ftop"><div class="feyebrow">'+esc(it.country)+'</div>'+
        '<div class="fname">'+esc(it.name)+'</div>'+
        (dep?'<div class="fdep">Odlet Praha <b>'+esc(dep)+'</b></div>':'')+
      '</div>'+
      (from>0?'<div class="ffrom">od <b>'+money(from)+'</b> Kč</div>':'')+
      '<div class="fhot">'+rows+'</div>'+
      (CONFIG.note?'<div class="fnote">'+esc(CONFIG.note)+'</div>':'')+
    '</div>';
}
function heroNext(){ if(heroItems.length<=1){ return; } heroIndex=(heroIndex+1)%heroItems.length; renderHero(); }

/* ---- SEZNAM ---- */
function dateChip(it){
  if(it.depart){ var m=/^(\d{4})-(\d{2})-(\d{2})/.exec(it.depart);
    if(m){ return '<div class="ldate"><span class="dd">'+parseInt(m[3],10)+". "+parseInt(m[2],10)+'.</span><span class="dy">'+m[1]+'</span></div>'; } }
  return '<div class="ldate alt">'+esc(it.term||"—")+'</div>';
}
function hotelSummary(it){
  var n=it.hotels.length;
  if(n===0){ return ""; }
  if(n===1){ return it.hotels[0].name+(it.hotels[0].stars>0?" "+starStr(it.hotels[0].stars):""); }
  return it.hotels[0].name+" a další "+(n-1)+" "+(n-1===1?"hotel":(n-1>=2&&n-1<=4?"hotely":"hotelů"));
}
function row(it){
  var from=fromPrice(it), ch=minChild(it);
  return '<div class="lrow'+(it.top?' hot':'')+'">'+dateChip(it)+
    '<div class="linfo"><div class="lcountry">'+esc(it.country)+'</div>'+
      '<div class="lname">'+esc(it.name)+(it.lastmin?' <span class="llm">LM</span>':'')+'</div>'+
      '<div class="lhot">'+esc(hotelSummary(it))+'</div></div>'+
    '<div class="lprice"><span class="pl">od</span><span class="pa">'+money(from)+' Kč</span>'+
      (ch>0?'<span class="pc">dítě '+money(ch)+' Kč</span>':'')+'</div></div>';
}
function buildPages(){
  var arr=sortedTrips(), per=listPerPage(), i;
  pages=[]; for(i=0;i<arr.length;i+=per){ pages.push(arr.slice(i,i+per)); }
  if(pages.length===0){ pages=[[]]; }
  if(activePage>=pages.length){ activePage=0; }
}
function plural(n,a,b,c){ if(n===1){ return a; } if(n>=2&&n<=4){ return b; } return c; }
function renderRows(){
  var box=document.getElementById("list");
  var list=pages[activePage]||[], h="", j;
  if(list.length===0){ h='<div class="lempty">Zatím žádné nabídky.</div>'; }
  for(j=0;j<list.length;j++){ h+=row(list[j]); }
  box.innerHTML=h;
  var total=chanData().length, info=total+" "+plural(total,"nabídka","nabídky","nabídek");
  if(pages.length>1){ info+="  ·  "+(activePage+1)+"/"+pages.length; }
  document.getElementById("pgInfo").textContent=info;
  var el=document.getElementById("pgdots");
  if(pages.length<=1){ el.innerHTML=""; } else { var d="",k; for(k=0;k<pages.length;k++){ d+='<span class="dot'+(k===activePage?' on':'')+'"></span>'; } el.innerHTML=d; }
}
function pageNext(){
  if(pages.length<=1){ return; }
  var box=document.getElementById("list");
  box.className="list fade";
  setTimeout(function(){ activePage=(activePage+1)%pages.length; renderRows(); box.className="list"; },450);
}
function rotStep(){ step++; heroNext(); if(step%2===0){ pageNext(); } }
function startRotate(){ if(rotTimer){ clearInterval(rotTimer); } step=0; rotTimer=setInterval(rotStep, CONFIG.rotateMs); }

/* ---- LIŠTA ---- */
function updateTickerVisibility(){ document.getElementById("ticker").className="ticker"+(tickerEmpty?" hide":""); }
function buildTicker(){
  var items=[],i,it,from,ch,cc=chanCfg();
  var hot=trimStr((cc&&trimStr(cc.ticker))?cc.ticker:CONFIG.tickerText);
  if(hot){ items.push('<span class="tk-hot">'+esc(hot)+'</span>'); }
  var arr=sortedTrips();
  for(i=0;i<arr.length;i++){ it=arr[i]; from=fromPrice(it); ch=minChild(it);
    items.push('<span class="tk-item">'+(it.lastmin?'<span class="tk-lm">Last minute</span> ':'')+
      esc(it.country)+' · '+esc(it.name)+(it.depart?' ('+esc(fmtDate(it.depart))+')':'')+' <b>od '+money(from)+' Kč</b>'+
      (ch>0?' <span class="tk-child">/ dítě od '+money(ch)+' Kč</span>':'')+'</span>'); }
  var track=document.getElementById("tkTrack");
  if(items.length===0){ tickerEmpty=true; track.innerHTML=""; updateTickerVisibility(); return; }
  tickerEmpty=false;
  var sep='<span class="tk-sep">&#10022;</span>', one=items.join(sep)+sep;
  track.innerHTML=one+one;
  var dur=items.length*8; if(dur<28){ dur=28; } track.style.animationDuration=dur+"s";
  updateTickerVisibility();
}

var DAYS=["neděle","pondělí","úterý","středa","čtvrtek","pátek","sobota"];
var MONTHS=["ledna","února","března","dubna","května","června","července","srpna","září","října","listopadu","prosince"];
function tick(){ var d=new Date(); function p(n){return n<10?"0"+n:""+n;}
  document.getElementById("clk").textContent=p(d.getHours())+":"+p(d.getMinutes());
  document.getElementById("dte").textContent=DAYS[d.getDay()]+" · "+d.getDate()+". "+MONTHS[d.getMonth()]; }

function renderAll(){ applyConfig(); buildHero(); renderHero(); buildPages(); renderRows(); buildTicker(); }

/* ---- cache + gist ---- */
function saveCache(p){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify(p)); }catch(e){} }
function loadCache(){ try{ var r=localStorage.getItem(CACHE_KEY); if(r){ return JSON.parse(r); } }catch(e){} return null; }
function applyPayload(p){ if(p&&p.data&&p.data.length!==undefined){ DATA=p.data; CONFIG=mergeConfig(p.config); normalizeData(); return true; } return false; }
function setStat(on){ document.getElementById("stat").className="stat"+(on?"":" off"); }
function fetchGist(id,cb){
  var xhr=new XMLHttpRequest(); xhr.open("GET","https://api.github.com/gists/"+id,true);
  xhr.setRequestHeader("Accept","application/vnd.github+json");
  xhr.onreadystatechange=function(){ if(xhr.readyState!==4){ return; }
    if(xhr.status>=200&&xhr.status<300){ try{ var g=JSON.parse(xhr.responseText); var f=g.files&&g.files[GIST_FILE];
      if(f&&f.content){ cb(null,JSON.parse(f.content)); return; } cb(new Error("chybí soubor")); }catch(e){ cb(e); } }
    else { cb(new Error("HTTP "+xhr.status)); } };
  xhr.onerror=function(){ cb(new Error("síť")); };
  xhr.send();
}
var lastRaw="";
function refreshFromGist(id){
  fetchGist(id,function(err,payload){
    if(err){ setStat(false); return; }
    var raw=JSON.stringify(payload); setStat(true);
    if(raw===lastRaw){ return; } lastRaw=raw;
    if(applyPayload(payload)){ saveCache(payload); renderAll(); startRotate(); }
  });
}

/* překreslit při otočení / změně velikosti */
var resizeT=null;
function onResize(){
  if(resizeT){ clearTimeout(resizeT); }
  resizeT=setTimeout(function(){
    var was=IS_PORTRAIT; detectLayout();
    if(was!==IS_PORTRAIT){ activePage=0; renderAll(); }
  },300);
}

function init(){
  detectLayout();
  detectChannel();
  var cached=loadCache();
  if(cached&&applyPayload(cached)){ lastRaw=JSON.stringify(cached); }
  else { normalizeData(); }
  renderAll();
  tick(); setInterval(tick,15000);
  startRotate();
  if(window.addEventListener){ window.addEventListener("resize",onResize,false); }
  var id=getGistId();
  if(id){ refreshFromGist(id); setInterval(function(){ refreshFromGist(id); }, POLL_MS); }
  else { setStat(true); }
}
init();
</script>
